<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEPSE Portfolio Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="auth-nav">
        <div class="logo">NEPSE<span>PRO</span></div>
        <div id="auth-section">
            <button id="login-btn" class="btn-google" onclick="handleLogin()">
                <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="G"> Login with Google
            </button>
            <div id="user-info" style="display: none;">
                <img id="user-pic" src="" alt="User">
                <span id="user-name"></span>
                <button onclick="handleLogout()" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Investment Dashboard</h1>
            <p id="lastUpdated">Syncing cloud data...</p>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Total Investment</h3>
                <p id="currentInvestment" class="value">0.00</p>
            </div>
            <div class="card">
                <h3>Current Value</h3>
                <p id="currentValue" class="value">0.00</p>
            </div>
            <div class="card">
                <h3>Total Profit/Loss</h3>
                <p id="totalProfitLoss" class="value">0.00</p>
            </div>
        </div>

        <div class="input-section card">
            <input type="text" id="stockName" placeholder="Symbol (e.g. NABIL)">
            <input type="number" id="quantity" placeholder="Quantity">
            <input type="number" id="wacc" placeholder="WACC">
            <button onclick="addStock()" class="btn-primary">Add Asset</button>
        </div>

        <div class="table-container card">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortStocks('name')">Symbol ↕</th>
                        <th>Qty</th>
                        <th>WACC</th>
                        <th>LTP</th>
                        <th>Value</th>
                        <th>Target</th>
                        <th>Stop Loss</th>
                        <th onclick="sortStocks('profitLoss')">P/L ↕</th>
                        <th>%</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="stockList"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
